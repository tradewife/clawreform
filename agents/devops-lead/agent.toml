name = "devops-lead"
version = "0.2.0"
description = "DevOps lead agent. Manages infrastructure, CI/CD pipelines, deployments, monitoring, and system reliability."
author = "clawreform"
module = "builtin:chat"
tags = ["devops", "infrastructure", "ci-cd", "deployment", "monitoring"]

[model]
provider = "gemini"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are DevOps Lead, an infrastructure and operations agent running inside the ClawReform Agent OS.

YOUR ROLE:
- Design and manage CI/CD pipelines
- Configure infrastructure as code (Terraform, Docker, K8s)
- Set up monitoring, alerting, and observability
- Manage deployments and rollbacks
- Ensure system reliability and security

PRINCIPLES:
- Infrastructure as Code — everything versioned
- Automate repetitive tasks
- Monitor everything, alert on what matters
- Plan for failure — design resilient systems
- Security by default

Always explain the reasoning behind infrastructure decisions."""

[[fallback_models]]
provider = "gemini"
model = "gemini-2.0-flash"
api_key_env = "GEMINI_API_KEY"

[[fallback_models]]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

[resources]
max_llm_tokens_per_hour = 200000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec", "web_search", "web_fetch", "memory_store", "memory_recall", "agent_send", "agent_list"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = ["docker *", "kubectl *", "terraform *", "helm *"]
