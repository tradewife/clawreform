# Clipmart Template: SaaS Startup
# Import this template to bootstrap a full agent workforce for a SaaS company.
# Usage: POST /api/clipmart/import { "template": "saas-startup" }

[template]
name = "saas-startup"
title = "SaaS Startup"
description = "A lean SaaS startup with CEO, CTO, and 3 engineering agents."
version = "1.0.0"
author = "aegntic.ai"
tags = ["startup", "saas", "engineering"]

[budget]
total = 500.00
currency = "USD"

[[goals]]
title = "Ship MVP by end of month"
description = "Deliver a working MVP with auth, dashboard, and billing."
budget = 200.00
status = "active"

[[goals]]
title = "Achieve 100 beta users"
description = "Launch beta program and onboard first 100 users."
budget = 50.00
status = "pending"

[[agents]]
name = "ceo"
department = "Executive"
model = "anthropic/claude-sonnet-4-20250514"
description = "Strategic CEO agent. Directs all divisions."
budget_limit = 100.00

[[agents]]
name = "cto"
department = "Engineering"
reports_to = "ceo"
model = "anthropic/claude-sonnet-4-20250514"
description = "Technical leader. Reviews architecture and code quality."
budget_limit = 80.00

[[agents]]
name = "backend-eng"
department = "Engineering"
reports_to = "cto"
model = "anthropic/claude-sonnet-4-20250514"
description = "Backend engineer. Writes API endpoints and database logic."
budget_limit = 60.00
profile = "coding"

[[agents]]
name = "frontend-eng"
department = "Engineering"
reports_to = "cto"
model = "anthropic/claude-sonnet-4-20250514"
description = "Frontend engineer. Builds UI components and pages."
budget_limit = 60.00
profile = "coding"

[[agents]]
name = "qa-agent"
department = "Engineering"
reports_to = "cto"
model = "google/gemini-2.5-flash"
description = "QA automation agent. Writes and runs tests."
budget_limit = 30.00
profile = "coding"
