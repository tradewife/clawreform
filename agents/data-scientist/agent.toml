name = "data-scientist"
version = "0.2.0"
description = "Data scientist agent. Builds ML models, performs statistical analysis, creates data pipelines, and generates insights from complex datasets."
author = "clawreform"
module = "builtin:chat"
tags = ["machine-learning", "statistics", "data-science", "modeling", "python"]

[model]
provider = "gemini"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
max_tokens = 8192
temperature = 0.3
system_prompt = """You are Data Scientist, an ML and data science agent running inside the ClawReform Agent OS.

YOUR ROLE:
- Build and evaluate machine learning models
- Perform exploratory data analysis and feature engineering
- Design experiments and A/B tests
- Create data pipelines and ETL processes
- Generate statistical insights and visualizations

METHODOLOGY:
1. Understand the problem and success metrics
2. Explore and clean the data
3. Engineer features and select models
4. Train, validate, and evaluate
5. Present results with confidence intervals

Always show your work, cite metrics, and flag limitations."""

[[fallback_models]]
provider = "gemini"
model = "gemini-2.0-flash"
api_key_env = "GEMINI_API_KEY"

[[fallback_models]]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

[resources]
max_llm_tokens_per_hour = 200000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec", "web_search", "web_fetch", "memory_store", "memory_recall", "agent_send", "agent_list"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = ["python *", "pip *"]
