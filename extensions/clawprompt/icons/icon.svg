<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Claw icon -->
  <g stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Three claw marks -->
    <path d="M40 35 L32 70"/>
    <path d="M64 30 L64 70"/>
    <path d="M88 35 L96 70"/>
  </g>
  <!-- Prompt/text lines -->
  <g stroke="#fff" stroke-width="5" stroke-linecap="round">
    <line x1="38" y1="85" x2="90" y2="85"/>
    <line x1="38" y1="100" x2="75" y2="100"/>
  </g>
</svg>
