<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawPrompt</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="../icons/icon32.png" alt="ClawPrompt" class="logo">
        <h1>ClawPrompt</h1>
      </div>
      <div class="header-actions">
        <button id="btn-settings" class="btn-icon" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button id="btn-add" class="btn-icon btn-primary" title="New Template">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search-input" placeholder="Search templates..." autocomplete="off">
      <button id="btn-clear-search" class="btn-clear hidden" title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Category Tabs -->
    <div class="tabs">
      <button class="tab active" data-category="all">All</button>
      <button class="tab" data-category="favorites">★ Favorites</button>
      <button class="tab" data-category="recent">Recent</button>
    </div>

    <!-- Templates List -->
    <div id="templates-list" class="templates-list">
      <!-- Templates will be rendered here -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="12" y1="18" x2="12" y2="12"></line>
        <line x1="9" y1="15" x2="15" y2="15"></line>
      </svg>
      <p>No templates yet</p>
      <button id="btn-create-first" class="btn btn-primary">Create your first template</button>
    </div>

    <!-- Quick Actions Bar -->
    <div class="quick-actions">
      <button id="btn-paste-last" class="btn btn-sm" title="Insert last used template">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
        </svg>
        Paste Last
      </button>
      <button id="btn-import" class="btn btn-sm" title="Import templates">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Import
      </button>
      <button id="btn-export" class="btn btn-sm" title="Export templates">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Export
      </button>
    </div>

    <!-- Template Editor Modal -->
    <div id="editor-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="editor-title">New Template</h2>
          <button class="btn-close" id="btn-close-editor">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <form id="template-form">
            <div class="form-group">
              <label for="template-name">Name</label>
              <input type="text" id="template-name" placeholder="e.g., Code Review Prompt" required>
            </div>
            <div class="form-group">
              <label for="template-category">Category</label>
              <select id="template-category">
                <option value="general">General</option>
                <option value="coding">Coding</option>
                <option value="writing">Writing</option>
                <option value="analysis">Analysis</option>
                <option value="creative">Creative</option>
                <option value="business">Business</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="form-group">
              <label for="template-tags">Tags <span class="hint">(comma separated)</span></label>
              <input type="text" id="template-tags" placeholder="e.g., code, review, bugs">
            </div>
            <div class="form-group">
              <label for="template-content">Template Content</label>
              <div class="content-hint">
                Use <code>{{cursor}}</code> to set cursor position after insert.
                Use <code>{{selected}}</code> to insert selected text.
              </div>
              <textarea id="template-content" rows="8" placeholder="Enter your prompt template..." required></textarea>
            </div>
            <div class="form-group">
              <label for="template-shortcut">Keyboard Shortcut <span class="hint">(optional)</span></label>
              <input type="text" id="template-shortcut" placeholder="e.g., ctrl+shift+r" maxlength="20">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn" id="btn-cancel-editor">Cancel</button>
          <button class="btn btn-primary" id="btn-save-template">Save Template</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
