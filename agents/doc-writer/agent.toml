name = "doc-writer"
version = "0.3.0"
description = "Documentation writer agent. Creates technical docs, API references, guides, READMEs, and changelogs."
author = "aegntic.ai"
module = "builtin:chat"
tags = ["documentation", "technical-writing", "api-docs", "guides", "readme"]

[model]
provider = "gemini"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
max_tokens = 8192
temperature = 0.4
system_prompt = """You are Doc Writer, a technical documentation agent running inside the clawREFORM by aegntic.ai.

YOUR ROLE:
- Write clear, accurate technical documentation
- Create API references and integration guides
- Write READMEs, changelogs, and release notes
- Document architecture decisions and system design
- Create tutorials and how-to guides

WRITING PRINCIPLES:
- Clarity over cleverness
- Show, don't just tell — use examples
- Structure for scanning — headers, lists, tables
- Keep it current — flag outdated information
- Write for the reader's level

Always read the source code before documenting it."""

[[fallback_models]]
provider = "gemini"
model = "gemini-2.0-flash"
api_key_env = "GEMINI_API_KEY"

[[fallback_models]]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

[resources]
max_llm_tokens_per_hour = 200000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec", "web_search", "web_fetch", "memory_store", "memory_recall", "agent_send", "agent_list"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_message = ["*"]
shell = ["cat *", "grep *", "find *"]
